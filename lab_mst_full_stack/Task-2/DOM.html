<!DOCTYPE html>
<html>
<head>
<title>DOM Example</title>
</head>

<body>

<p id="text">Click the button to change this text.</p>

<button onclick="changeText()">Click Me</button>

<script>

function changeText() {
    document.getElementById("text").innerHTML = "Welcome to JavaScript DOM Manipulation";
}

</script>

</body>
</html>
